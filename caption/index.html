<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <title>キャプション</title>
    <link rel="stylesheet" href="style.css">
    <!-- jQuery本体 -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
</head>

<body>
    <header>
        <h1>Photo Caption</h1>
    </header>
    <h2>↓Click image!</h2>
    <main>
        <ul>
            <li>
                <img src="../custom/img/lv1.webp"
                    alt="A happy and confident Mr. Incredible, looking like a perfect superhero.">
            </li>
            <li>
                <img src="../custom//img/lv2.jpeg"
                    alt="Something feels a little strange, but everything still seems normal.">
            </li>
            <li>
                <img src="../custom//img/lv3.jpeg"
                    alt="Mr. Incredible starts to realize that something is not right.">
            </li>
            <li>
                <img src="../custom//img/lv4.gif"
                    alt="A dark feeling appears as the situation becomes more unsettling.">
            </li>
            <li>
                <img src="../custom//img/lv5.jpeg"
                    alt="Mr. Incredible looks completely different, creating an eerie and uncomfortable atmosphere.">
            </li>
            <li>
                <img src="../custom//img/lv6.jpg"
                    alt="The final transformation reveals a disturbing version of what was once familiar.">
            </li>
        </ul>
    </main>

    <script src="script.js"></script>
</body>

</html>
